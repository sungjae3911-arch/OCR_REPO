# @package _global_
# v14: EfficientNet-B4 + RandomCrop augmentation for small text
# 1536으로 업스케일 후 1024 랜덤 크롭 → 소형 글자가 상대적으로 크게 학습됨

defaults:
  - base
  - /preset/datasets/db
  - /preset/models/model_v4
  - /preset/lightning_modules/base
  - _self_

trainer:
  max_epochs: 20

dataloaders:
  train_dataloader:
    batch_size: 4
    shuffle: True
    num_workers: 4
  val_dataloader:
    batch_size: 4
    shuffle: False
    num_workers: 4
  test_dataloader:
    batch_size: 4
    shuffle: False
    num_workers: 4

collate_fn:
  shrink_ratio: 0.45

transforms:
  train_transform:
    _target_: ${dataset_path}.DBTransforms
    transforms:
      - _target_: albumentations.LongestMaxSize
        max_size: 1536
        p: 1.0
      - _target_: albumentations.PadIfNeeded
        min_width: 1536
        min_height: 1536
        border_mode: 0
        p: 1.0
      - _target_: albumentations.RandomCrop
        height: 1024
        width: 1024
        p: 1.0
      - _target_: albumentations.HorizontalFlip
        p: 0.5
      - _target_: albumentations.Normalize
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]
    keypoint_params:
      _target_: albumentations.KeypointParams
      format: 'xy'
      remove_invisible: True
  val_transform:
    _target_: ${dataset_path}.DBTransforms
    transforms:
      - _target_: albumentations.LongestMaxSize
        max_size: 1024
        p: 1.0
      - _target_: albumentations.PadIfNeeded
        min_width: 1024
        min_height: 1024
        border_mode: 0
        p: 1.0
      - _target_: albumentations.Normalize
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]
    keypoint_params:
      _target_: albumentations.KeypointParams
      format: 'xy'
      remove_invisible: True
  test_transform:
    _target_: ${dataset_path}.DBTransforms
    transforms:
      - _target_: albumentations.LongestMaxSize
        max_size: 1024
        p: 1.0
      - _target_: albumentations.PadIfNeeded
        min_width: 1024
        min_height: 1024
        border_mode: 0
        p: 1.0
      - _target_: albumentations.Normalize
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]
    keypoint_params:
      _target_: albumentations.KeypointParams
      format: 'xy'
      remove_invisible: True
