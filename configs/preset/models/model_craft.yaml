# @package _global_

defaults:
  - /preset/models/decoder/unet_vgg16
  - /preset/models/encoder/vgg16
  - /preset/models/head/craft_head
  - /preset/models/loss/craft_loss
  - _self_

models:
  optimizer:
    _target_: torch.optim.Adam
    lr: 0.001
    weight_decay: 0.0001
  scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    T_max: 20
    eta_min: 0.00001
