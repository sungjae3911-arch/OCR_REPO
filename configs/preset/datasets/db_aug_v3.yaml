# @package _global_
# v3: v2 대비 변경사항
#   1. Rotate: ±10 → ±45 (기울어진 영수증 대응)
#   2. RandomScale: 축소만(-0.3~0) → 양방향(-0.3~0.3, 작은/큰 영수증 대응)
#   3. ElasticTransform 추가 (구겨진/접힌 영수증 대응)

dataset_base_path: "/root/ocr/data/datasets/"

datasets:
  train_dataset:
    _target_: ${dataset_path}.OCRDataset
    image_path: ${dataset_base_path}images/train
    annotation_path: ${dataset_base_path}jsons/train.json
    transform: ${transforms.train_transform}
  val_dataset:
    _target_: ${dataset_path}.OCRDataset
    image_path: ${dataset_base_path}images/val
    annotation_path: ${dataset_base_path}jsons/val.json
    transform: ${transforms.val_transform}
  test_dataset:
    _target_: ${dataset_path}.OCRDataset
    image_path: ${dataset_base_path}images/val
    annotation_path: ${dataset_base_path}jsons/val.json
    transform: ${transforms.test_transform}
  predict_dataset:
    _target_: ${dataset_path}.OCRDataset
    image_path: ${dataset_base_path}images/test
    annotation_path: null
    transform: ${transforms.test_transform}

transforms:
  train_transform:
    _target_: ${dataset_path}.DBTransforms
    transforms:
      - _target_: albumentations.LongestMaxSize
        max_size: 1024
        p: 1.0
      - _target_: albumentations.PadIfNeeded
        min_width: 1024
        min_height: 1024
        border_mode: 0
        p: 1.0
      - _target_: albumentations.HorizontalFlip
        p: 0.5
      - _target_: albumentations.Rotate
        limit: 15
        border_mode: 0
        p: 0.5
      - _target_: albumentations.Perspective
        scale: [0.05, 0.1]
        p: 0.3
      - _target_: albumentations.RandomScale
        scale_limit: [-0.3, 0.3]
        p: 0.5
      - _target_: albumentations.LongestMaxSize
        max_size: 1024
        p: 1.0
      - _target_: albumentations.PadIfNeeded
        min_width: 1024
        min_height: 1024
        border_mode: 0
        p: 1.0
      - _target_: albumentations.RandomBrightnessContrast
        brightness_limit: 0.2
        contrast_limit: 0.3
        p: 0.5
      - _target_: albumentations.CLAHE
        clip_limit: 4.0
        tile_grid_size: [8, 8]
        p: 0.3
      - _target_: albumentations.GaussianBlur
        blur_limit: [3, 5]
        p: 0.3
      - _target_: albumentations.MotionBlur
        blur_limit: [3, 7]
        p: 0.2
      - _target_: albumentations.ImageCompression
        quality_lower: 75
        quality_upper: 100
        p: 0.3
      - _target_: albumentations.Normalize
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]
    image_only_transforms:
      - _target_: albumentations.GridDistortion
        num_steps: 5
        distort_limit: 0.15
        border_mode: 0
        p: 0.2
      - _target_: albumentations.ElasticTransform
        alpha: 1.0
        sigma: 50
        p: 0.3
    keypoint_params:
      _target_: albumentations.KeypointParams
      format: 'xy'
      remove_invisible: True
  val_transform:
    _target_: ${dataset_path}.DBTransforms
    transforms:
      - _target_: albumentations.LongestMaxSize
        max_size: 1024
        p: 1.0
      - _target_: albumentations.PadIfNeeded
        min_width: 1024
        min_height: 1024
        border_mode: 0
        p: 1.0
      - _target_: albumentations.Normalize
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]
    keypoint_params:
      _target_: albumentations.KeypointParams
      format: 'xy'
      remove_invisible: True
  test_transform:
    _target_: ${dataset_path}.DBTransforms
    transforms:
      - _target_: albumentations.LongestMaxSize
        max_size: 1024
        p: 1.0
      - _target_: albumentations.PadIfNeeded
        min_width: 1024
        min_height: 1024
        border_mode: 0
        p: 1.0
      - _target_: albumentations.Normalize
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]
    keypoint_params:
      _target_: albumentations.KeypointParams
      format: 'xy'
      remove_invisible: True
  predict_transform:
    _target_: ${dataset_path}.DBTransforms
    transforms:
      - _target_: albumentations.LongestMaxSize
        max_size: 640
        p: 1.0
      - _target_: albumentations.PadIfNeeded
        min_width: 640
        min_height: 640
        border_mode: 0
        p: 1.0
      - _target_: albumentations.Normalize
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]
    keypoint_params: null

dataloaders:
  train_dataloader:
    batch_size: 4
    shuffle: True
    num_workers: 4
  val_dataloader:
    batch_size: 4
    shuffle: False
    num_workers: 4
  test_dataloader:
    batch_size: 4
    shuffle: False
    num_workers: 4
  predict_dataloader:
    batch_size: 1
    shuffle: False
    num_workers: 4

collate_fn:
  _target_: ${dataset_path}.DBCollateFN
  shrink_ratio: 0.4
  thresh_min: 0.3
  thresh_max: 0.7
