# @package _global_
# v12 checkpointлҐј 1536 н•ґмѓЃлЏ„лЎњ inference (мћ¬н•™мЉµ м—†мќЊ)

defaults:
  - base
  - /preset/datasets/db
  - /preset/models/model_v4
  - /preset/lightning_modules/base
  - _self_

collate_fn:
  shrink_ratio: 0.45

transforms:
  test_transform:
    _target_: ${dataset_path}.DBTransforms
    transforms:
      - _target_: albumentations.LongestMaxSize
        max_size: 1536
        p: 1.0
      - _target_: albumentations.PadIfNeeded
        min_width: 1536
        min_height: 1536
        border_mode: 0
        p: 1.0
      - _target_: albumentations.Normalize
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]
    keypoint_params:
      _target_: albumentations.KeypointParams
      format: 'xy'
      remove_invisible: True
